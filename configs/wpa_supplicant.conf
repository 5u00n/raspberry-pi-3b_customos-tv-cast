# WiFi configuration for Raspberry Pi 3B
# This file should be placed in /boot/wpa_supplicant.conf
# The Pi will automatically connect to the configured network

country=US
ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1

# Example network configuration
# Replace with your actual WiFi credentials
network={
    ssid="YOUR_WIFI_SSID"
    psk="YOUR_WIFI_PASSWORD"
    key_mgmt=WPA-PSK
}

# Additional networks can be added here
# network={
#     ssid="SECOND_WIFI_SSID"
